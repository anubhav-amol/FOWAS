version: "3.9"

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fowas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fowas}
      POSTGRES_DB: ${POSTGRES_DB:-fowas}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-fowas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fowas}:${POSTGRES_PASSWORD:-fowas}@db/${POSTGRES_DB:-fowas}
      SECRET_KEY: ${SECRET_KEY:-fowas-dev-secret-key-change-in-production}
      ALGORITHM: HS256
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PORT: 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    environment:
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
